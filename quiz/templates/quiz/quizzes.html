{% extends 'quiz/base.html' %}

{% block content %}

<h2 class="page-title">Quizze</h2>

<div class="quiz-list">

    {% for quiz in quizzes %}
    <div class="quiz-card card">

        <div class="quiz-card-content">

            <div class="quiz-title">
                <a href="{% url 'quiz:quiz' quiz.id %}">
                    {{ quiz.title }}
                </a>
            </div>

            <div class="quiz-actions">
                <a href="{% url 'quiz:quiz' quiz.id %}" class="btn primary small">
                    Starten
                </a>
            </div>

        </div>

    </div>

    {% empty %}
    <div class="card empty-state">
        Noch kein Quiz vorhanden.
    </div>
    {% endfor %}

</div>

{% endblock content %}
