{% extends 'quiz/base.html' %}

{% block extra_head %}
<script>
    window.MathJax = {
        tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$']]
        }
    };
</script>

<script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
</script>
{% endblock %}

{% block content %}

<h2>Fragen</h2>

<div class="quiz-form">
    <form method="post">
        {% csrf_token %}

        {% for field in form %}
        <div class="quiz-field">
            {{ field.label_tag }}
            {{ field }}
            {{ field.errors }}
        </div>
        {% endfor %}

        <button type="submit">Abgeben</button>
    </form>
</div>

{% endblock %}
