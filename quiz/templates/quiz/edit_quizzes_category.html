{% extends 'quiz/base.html' %}

{% block content %}

<h2 class="page-title">Meine {{category.name}} Quizze</h2>

<div class="quiz-list">

    {% for quiz in quizzes %}
    <div class="quiz-card card">

        <div class="quiz-card-content">

            <div class="quiz-title">
                <a href="{% url 'quiz:quiz' quiz.id %}">
                    {{ quiz.title }}
                </a>
            </div>

            <div class="quiz-actions">

                <a href="{% url 'quiz:edit_quiz' quiz.id %}" class="btn secondary small">
                    Bearbeiten
                </a>

                <form action="{% url 'quiz:delete_quiz' quiz.id %}" method="post" class="inline-form">
                    {% csrf_token %}
                    <button type="submit" class="btn danger small" onclick="return confirm('Quiz wirklich löschen?');">
                        Löschen
                    </button>
                </form>

            </div>

        </div>

    </div>
    {% empty %}
    <div class="card empty-state">
        Noch kein Quiz vorhanden.
    </div>
    {% endfor %}

</div>

{% endblock content %}
